# 公共配置文件 R
server:
  address: 0.0.0.0
  port: 8081
  servlet:
    context-path: /api
spring:
  application:
    name: bookmeeting
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/meeting
    username: root
    password: 123456
  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB # 大小限制

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      table-underline: true
      logic-delete-field: is_delete # 全局逻辑删除的实体字段名
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）

